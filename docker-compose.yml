services:
  # Database Service
  postgres:
    image: postgres:16-alpine
    container_name: beginagain_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_password}
      POSTGRES_DB: ${DB_NAME:-beginagain}
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beginagain_backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_password}@postgres:5432/${DB_NAME:-beginagain}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_here}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      MERCHANT_KEY: ${MERCHANT_KEY}
      MERCHANT_SALT: ${MERCHANT_SALT}
      PAYU_ENVIRONMENT: ${PAYU_ENVIRONMENT:-TEST}
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    networks:
      - app-network

  # Frontend Next.js Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass NEXT_PUBLIC_ env variables at build-time (required for Next.js build)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    container_name: beginagain_frontend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 8080
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
